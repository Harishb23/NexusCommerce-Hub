services:
  db:
    image: postgres:16-alpine
    container_name: commerceops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: commerceops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commerceops"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - commerceops-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commerceops-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=commerceops;Username=postgres;Password=postgres"
      AllowedOrigins: "http://localhost:3000"
      Inventory__LowStockThreshold: "10"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerceops-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: commerceops-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - commerceops-net

volumes:
  postgres_data:
    name: commerceops-postgres-data

networks:
  commerceops-net:
    name: commerceops-network
    driver: bridge
